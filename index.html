<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiendo los Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>¡Haz clic en un número!</h1>
    
    <div class="contenedor-numeros">
        <button class="boton-numero" onclick="decirNumero(1)">1</button>
        <button class="boton-numero" onclick="decirNumero(2)">2</button>
        <button class="boton-numero" onclick="decirNumero(3)">3</button>
        <button class="boton-numero" onclick="decirNumero(4)">4</button>
        <button class="boton-numero" onclick="decirNumero(5)">5</button>
        <button class="boton-numero" onclick="decirNumero(6)">6</button>
        <button class="boton-numero" onclick="decirNumero(7)">7</button>
        <button class="boton-numero" onclick="decirNumero(8)">8</button>
        <button class="boton-numero" onclick="decirNumero(9)">9</button>
        <button class="boton-numero" onclick="decirNumero(10)">10</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
